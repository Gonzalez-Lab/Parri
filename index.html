<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Colección de Discos de Parri</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <h1>La colección de Parri</h1>
    <p>Un viaje musical en 3253 discos</p>
  </section>

  <!-- STATS -->
  <section class="stats">
    <div class="card">
      <h2>3253+</h2>
      <p>Discos</p>
    </div>
    <div class="card">
      <h2>402</h2>
      <p>Artistas</p>
    </div>
    <div class="card">
      <h2>1961–2025</h2>
      <p>Años</p>
    </div>
  </section>

  <!-- VISUAL 1 -->
  <section class="viz">
    <h2>Artistas más escuchados</h2>
    <iframe src="ACA_VA_FLOURISH" width="100%" height="500"></iframe>
  </section>

  <!-- VISUAL 2 -->
  <section class="viz">
    <h2>Evolución de la colección</h2>
    <div class="flourish-embed flourish-chart" data-src="visualisation/28126679"><script src="https://public.flourish.studio/resources/embed.js"></script><noscript><img src="https://public.flourish.studio/visualisation/28126679/thumbnail" width="100%" alt="visualization" /></noscript></div>
     <div class="flourish-embed flourish-chart" data-src="visualisation/28126704"></div>
  <script src="https://public.flourish.studio/resources/embed.js"></script>

  <!-- VISUAL 3 -->
  <section class="viz">
    <h2>Formatos</h2>
    <iframe src="ACA_VA_DATAWRAPPER" width="100%" height="500"></iframe>
  </section>

  <!-- CIERRE -->
  <section class="footer">
    <p>Hecho con ❤️ y muchos discos</p>
  </section>

</body>
</html>
