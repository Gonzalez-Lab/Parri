<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Colección de Discos</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <h1>La colección de [Nombre]</h1>
    <p>Un viaje musical en 3500 discos</p>
  </section>

  <!-- STATS -->
  <section class="stats">
    <div class="card">
      <h2>3500+</h2>
      <p>Discos</p>
    </div>
    <div class="card">
      <h2>XX</h2>
      <p>Artistas</p>
    </div>
    <div class="card">
      <h2>1980–2023</h2>
      <p>Años</p>
    </div>
  </section>

  <!-- VISUAL 1 -->
  <section class="viz">
    <h2>Artistas más escuchados</h2>
    <iframe src="ACA_VA_FLOURISH" width="100%" height="500"></iframe>
  </section>

  <!-- VISUAL 2 -->
  <section class="viz">
    <h2>Evolución de la colección</h2>
    <iframe src="ACA_VA_FLOURISH" width="100%" height="500"></iframe>
  </section>

  <!-- VISUAL 3 -->
  <section class="viz">
    <h2>Formatos</h2>
    <iframe src="ACA_VA_DATAWRAPPER" width="100%" height="500"></iframe>
  </section>

  <!-- CIERRE -->
  <section class="footer">
    <p>Hecho con ❤️ y muchos discos</p>
  </section>

</body>
</html>
